apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-app
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stress-app
  template:
    metadata:
      labels:
        app: stress-app
    spec:
      containers:
        - name: stress
          image: polinux/stress
          command: ["stress"]
          args:
            - "--vm"
            - "1"
            - "--vm-bytes"
            - "150M"
            - "--vm-hang"
            - "1"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
